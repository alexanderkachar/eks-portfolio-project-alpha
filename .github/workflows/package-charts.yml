name: Package Charts

on:
  push:
    branches:
      - main
    paths:
      - "apps/charts/todo/**"
      - "apps/charts/platform/**"
  workflow_run:
    workflows:
      - "Build Backend"
      - "Build Frontend"
    types:
      - completed
    branches:
      - main

env:
  AWS_REGION: us-east-1
  CHART_OCI_PARENT: charts

jobs:
  package-and-push:
    name: Package & push Helm charts
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: [self-hosted, linux, x64, vpc]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve image SHA and ECR registry
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "value=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_REGISTRY=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_ENV

      - name: Install yq
        env:
          YQ_VERSION: v4.44.3
        run: |
          curl -fsSL \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      # Stamp both image tags in values.yaml with the commit SHA that produced them.
      - name: Update image tags in values.yaml
        env:
          SHA: ${{ steps.sha.outputs.value }}
        run: |
          yq -i ".frontend.image.tag = \"${SHA}\"" apps/charts/todo/values.yaml
          yq -i ".backend.image.tag  = \"${SHA}\"" apps/charts/todo/values.yaml

      # Bump the chart patch version: 0.1.3 → 0.1.4
      - name: Bump todo chart patch version
        run: |
          current=$(yq '.version' apps/charts/todo/Chart.yaml)
          IFS='.' read -r major minor patch <<< "$current"
          new_version="${major}.${minor}.$((patch + 1))"
          yq -i ".version = \"${new_version}\"" apps/charts/todo/Chart.yaml
          echo "CHART_VERSION=${new_version}" >> $GITHUB_ENV

      - name: Login to ECR (Helm OCI)
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | helm registry login \
                --username AWS \
                --password-stdin \
                ${{ env.ECR_REGISTRY }}

      - name: Package todo chart
        run: |
          helm package apps/charts/todo -d /tmp/charts

      - name: Push todo chart to ECR OCI
        run: |
          helm push /tmp/charts/todo-${{ env.CHART_VERSION }}.tgz \
            oci://${{ env.ECR_REGISTRY }}/${{ env.CHART_OCI_PARENT }}

      - name: Bump platform chart patch version
        run: |
          current=$(yq '.version' apps/charts/platform/Chart.yaml)
          IFS='.' read -r major minor patch <<< "$current"
          new_version="${major}.${minor}.$((patch + 1))"
          yq -i ".version = \"${new_version}\"" apps/charts/platform/Chart.yaml
          echo "PLATFORM_VERSION=${new_version}" >> $GITHUB_ENV

      - name: Package platform chart
        run: |
          helm package apps/charts/platform -d /tmp/charts

      - name: Push platform chart to ECR OCI
        run: |
          helm push /tmp/charts/platform-${{ env.PLATFORM_VERSION }}.tgz \
            oci://${{ env.ECR_REGISTRY }}/${{ env.CHART_OCI_PARENT }}

      - name: Output chart versions
        run: |
          echo "### Charts pushed" >> $GITHUB_STEP_SUMMARY
          echo "- **todo** version: \`${{ env.CHART_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **platform** version: \`${{ env.PLATFORM_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **image tag**: \`${{ steps.sha.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
